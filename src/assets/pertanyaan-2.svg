<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="24" fill="#FFF8E7"/>
  <!-- Pencil -->
  <g transform="translate(100, 180) rotate(-35)">
    <rect x="0" y="0" width="16" height="90" rx="3" fill="#D97706"/>
    <rect x="0" y="0" width="16" height="20" rx="3" fill="#1C1917"/>
    <polygon points="8,90 0,78 16,78" fill="#FDE68A" stroke="#D97706" stroke-width="1"/>
    <line x1="8" y1="90" x2="8" y2="96" stroke="#A8A29E" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Flower being drawn -->
  <g transform="translate(240, 120)">
    <!-- Stem -->
    <line x1="0" y1="60" x2="0" y2="0" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M0 40 Q-15 35 -10 25" stroke="#16A34A" stroke-width="2" fill="#BBF7D0" stroke-linecap="round"/>
    <path d="M0 25 Q15 20 10 10" stroke="#16A34A" stroke-width="2" fill="#BBF7D0" stroke-linecap="round"/>
    <!-- Petals -->
    <circle cx="0" cy="-8" r="10" fill="#D97706" opacity="0.5"/>
    <circle cx="-10" cy="0" r="10" fill="#D97706" opacity="0.6"/>
    <circle cx="10" cy="0" r="10" fill="#D97706" opacity="0.7"/>
    <circle cx="-6" cy="-8" r="10" fill="#D97706" opacity="0.8"/>
    <circle cx="6" cy="-8" r="10" fill="#D97706"/>
    <!-- Center -->
    <circle cx="0" cy="-4" r="6" fill="#FDE68A"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="310" cy="80" r="4" fill="#D97706" opacity="0.3"/>
  <circle cx="330" cy="100" r="3" fill="#D97706" opacity="0.5"/>
  <circle cx="320" cy="60" r="2" fill="#D97706"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" fill="#1C1917" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Custom Sesuai Keinginan</text>
</svg>
