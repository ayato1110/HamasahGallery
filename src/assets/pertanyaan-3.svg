<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="24" fill="#FFF8E7"/>
  <!-- Parcel box -->
  <rect x="120" y="110" width="160" height="120" rx="8" fill="white" stroke="#D97706" stroke-width="3"/>
  <!-- Lid -->
  <rect x="115" y="100" width="170" height="20" rx="6" fill="#D97706"/>
  <!-- Ribbon cross -->
  <line x1="200" y1="108" x2="200" y2="226" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="140" x2="245" y2="140" stroke="#D97706" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Ribbon bow -->
  <path d="M200 108 Q175 85 185 75 Q195 65 200 78 Q205 65 215 75 Q225 85 200 108Z" fill="#D97706"/>
  <!-- Location pin -->
  <g transform="translate(320, 90)">
    <path d="M0 0 C15 20 15 35 0 45 C-15 35 -15 20 0 0Z" fill="#EA580C"/>
    <circle cx="0" cy="15" r="6" fill="white"/>
  </g>
  <!-- Map dots path -->
  <path d="M130 230 Q160 210 200 225 Q240 240 280 220" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="4 4" fill="none" stroke-linecap="round"/>
  <circle cx="130" cy="230" r="4" fill="#D97706" opacity="0.4"/>
  <circle cx="200" cy="225" r="4" fill="#D97706" opacity="0.7"/>
  <circle cx="280" cy="220" r="4" fill="#D97706"/>
  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" fill="#1C1917" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Bisa Kirim ke Luar Kota</text>
</svg>
